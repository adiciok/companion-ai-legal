<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Resetare parolă — Companion AI</title>
  <style>
    body { font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           max-width: 480px; margin: 0 auto; padding: 32px; color: #1f2933; line-height: 1.6; }
    h1 { font-size: 1.6rem; }
    label { display: block; margin-top: 16px; font-weight: 600; font-size: 0.95rem; }
    input { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 12px;
            border: 1px solid #cbd5e1; border-radius: 10px; font-size: 1rem; }
    button { margin-top: 20px; width: 100%; padding: 13px; border: 0; border-radius: 10px;
             background: #2f6fed; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: default; }
    .muted { color: #66707a; font-size: 0.95rem; }
    .error { color: #c0392b; }
    .ok { color: #1e874b; }
    a { color: #2f6fed; }
  </style>
</head>
<body>
  <h1>Resetează parola</h1>
  <p id="status" class="muted">Se verifică linkul…</p>

  <form id="form" style="display:none">
    <label for="pw">Parolă nouă
      <input type="password" id="pw" minlength="6" autocomplete="new-password"
             placeholder="minim 6 caractere" required />
    </label>
    <label for="pw2">Confirmă parola
      <input type="password" id="pw2" minlength="6" autocomplete="new-password" required />
    </label>
    <button type="submit" id="submit">Salvează parola</button>
    <p id="formError" class="error" style="display:none"></p>
  </form>

  <p id="done" class="ok" style="display:none">
    Parola a fost schimbată. Revino în aplicația <strong>Companion AI</strong> și
    autentifică-te cu parola nouă.
  </p>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const SUPABASE_URL = 'https://chvqpzdqzvadjnhmmvig.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_9vw5KTXIPASIiLC7rMM4AQ_Ku80Kqks';

    const statusEl = document.getElementById('status');
    const form = document.getElementById('form');
    const done = document.getElementById('done');
    const formError = document.getElementById('formError');
    const submit = document.getElementById('submit');

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { detectSessionInUrl: true, flowType: 'implicit' },
    });

    function showForm() {
      statusEl.style.display = 'none';
      form.style.display = 'block';
    }

    function showError(msg) {
      statusEl.className = 'error';
      statusEl.textContent = msg;
      statusEl.style.display = 'block';
      form.style.display = 'none';
    }

    // A recovery link can arrive as an error, as #access_token (implicit) or as
    // ?code= (PKCE). supabase-js parses the hash automatically; we also handle
    // the explicit code-exchange and surface any error from the URL.
    async function init() {
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const query = new URLSearchParams(window.location.search);
      const urlError = hash.get('error_description') || query.get('error_description');
      if (urlError) {
        showError('Linkul de resetare nu mai este valid: ' + urlError +
          '. Cere un nou link din aplicație.');
        return;
      }

      const code = query.get('code');
      if (code) {
        const { error } = await supabase.auth.exchangeCodeForSession(code);
        if (error) { showError('Linkul de resetare a expirat. Cere un nou link din aplicație.'); return; }
      }

      const { data } = await supabase.auth.getSession();
      if (data.session) { showForm(); return; }

      // Give detectSessionInUrl a moment, then re-check.
      supabase.auth.onAuthStateChange((event, session) => {
        if (session) showForm();
      });
      setTimeout(async () => {
        const { data: d2 } = await supabase.auth.getSession();
        if (d2.session) showForm();
        else showError('Linkul de resetare a expirat sau este invalid. ' +
          'Cere un nou link din aplicație.');
      }, 1200);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.style.display = 'none';
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      if (pw.length < 6) { formError.textContent = 'Parola trebuie să aibă minim 6 caractere.'; formError.style.display = 'block'; return; }
      if (pw !== pw2) { formError.textContent = 'Parolele nu coincid.'; formError.style.display = 'block'; return; }
      submit.disabled = true;
      submit.textContent = 'Se salvează…';
      const { error } = await supabase.auth.updateUser({ password: pw });
      if (error) {
        formError.textContent = 'Nu am putut schimba parola: ' + error.message;
        formError.style.display = 'block';
        submit.disabled = false;
        submit.textContent = 'Salvează parola';
        return;
      }
      form.style.display = 'none';
      done.style.display = 'block';
      await supabase.auth.signOut();
    });

    init();
  </script>
</body>
</html>
